    <style data-purpose="custom-styling">
      body {
        background-color: #000000;
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(20, 20, 25, 1), transparent 50%),
          radial-gradient(circle at 85% 30%, rgba(10, 15, 25, 1), transparent 50%);
        color: #f5f5f7;
        -webkit-font-smoothing: antialiased;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        font-weight: 500;
        letter-spacing: 0.01em;
      }
      * {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      .profile-header {
        background: #1C1C1E;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        overflow: hidden;
      }
      .link-card {
        background: #1C1C1E;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .link-card:hover {
        background: rgba(44, 44, 46, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .hover-scale {
        transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.3s ease, border-color 0.3s ease;
      }
      .hover-scale:hover {
        transform: scale(0.98);
      }
      .connect-btn {
        background: #ffffff;
        color: #000000;
        transition: background-color 0.2s;
        /* Shadcn shadow & ring */
        box-shadow: 0 1px 2px rgba(0,0,0,0.4);

        background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.9);
      }
      .connect-btn:hover {
        color: black !important;
        transform: translateY(-2px);
        background: rgba(255,255,255,1);
      }
    
      @keyframes slideUpFade {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-enter {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
</style>

          <!-- Email Icon -->
          <svg
            class="h-5 w-5"
            fill="none"
            stroke="currentColor"
            viewbox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"

            <path
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"

      >

        <!-- Copyright -->
        <p
          class="text-text-secondary text-[11px] uppercase tracking-widest text-center"
        >
          © 2026 Keith. Built with love.
        </p>

        <!-- Realtime Visitor Counter -->
        <div class="mt-4 flex items-center justify-center gap-1.5 text-text-secondary text-[12px]">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
          </svg>
          <span id="visitor-count">...</span>
        </div>
      </footer>
      <!-- END: Footer -->
    </main>
    <!-- END: ProfileContainer -->
    
    <script>
      // Staggered link card animations using Motion One
      const { animate, stagger } = Motion;
      animate(
        '#links-list > a',
        { opacity: [0, 1], y: [20, 0] },
        { duration: 0.5, delay: stagger(0.1, { start: 0.15 }), easing: [0.16, 1, 0.3, 1] }
      );
    </script>

    <script>
      (function() {
        // Reuse cached count within the same session (same logic as shadow project)
        const cached = sessionStorage.getItem('keith_visitor_count');
        if (cached) {
          document.getElementById('visitor-count').innerText = parseInt(cached).toLocaleString();
          return;
        }

        fetch('https://api.counterapi.dev/v1/keith-link-page/hits/up')
          .then(res => res.json())
          .then(data => {
            if (data && data.count > 0) {
              document.getElementById('visitor-count').innerText = data.count.toLocaleString();
              sessionStorage.setItem('keith_visitor_count', String(data.count));
            }
          })
          .catch(() => {
            const fallback = localStorage.getItem('keith_visitor_fallback');
            document.getElementById('visitor-count').innerText = fallback ? parseInt(fallback).toLocaleString() : '—';
          });
      })();
    </script>
  </body>
